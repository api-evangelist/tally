specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Tally
providerId: tally
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Forms
- Surveys
- No-Code
- Free
- Notion-style
- Plans
- Pricing
description: >-
  Tally offers an unusually generous Free plan with unlimited forms and
  unlimited submissions (subject to fair-use). Two paid tiers — Pro and
  Business — add team features, custom branding/CSS, custom domains and
  longer version history. The Tally API is free for all plans including Free.
notes: >-
  Pricing reflects the public tally.so/pricing page as of 2026-05-08. EU-based,
  GDPR-compliant.
sources:
- https://tally.so/pricing
plans:
- id: tally-free
  name: Free
  type: free
  description: Unlimited forms and submissions (fair use). Includes conditional logic, signatures, file uploads, payments, and integrations.
  entries:
  - label: Plan price
    name: monthly_price
    type: flat
    metric: month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    currency: USD
    userMultiplied: false
  - label: Forms
    name: forms
    type: tier
    metric: forms
    limit: -1
    timeFrame: ongoing
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Submissions
    name: submissions
    type: tier
    metric: submissions/month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
- id: tally-pro
  name: Pro
  type: subscription
  description: $24/month. Removes Tally branding, custom domains, unlimited team collaboration, custom CSS, custom-domain email notifications, extended analytics.
  entries:
  - label: Plan price
    name: monthly_price
    type: flat
    metric: month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 24
    currency: USD
    userMultiplied: false
- id: tally-business
  name: Business
  type: subscription
  description: $74/month. All Pro features plus data retention controls, email verification, 90-day version history.
  entries:
  - label: Plan price
    name: monthly_price
    type: flat
    metric: month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 74
    currency: USD
    userMultiplied: false
