specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Tally
providerId: tally
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- Forms
- Surveys
- No-Code
- Free
- Notion-style
- Rate Limiting
- Quotas
- Throttling
description: >-
  Tally REST API requests are throttled per API key. Tally publishes that the
  API is free across all plans (no per-call charge) but does not enumerate a
  specific per-second numeric ceiling on the public reference. 429 with
  Retry-After is returned when the throttle is exceeded.
notes: >-
  Submissions themselves are unlimited on every plan subject to fair use. If
  request volume becomes a concern, Tally support raises caps on a per-team
  basis. Reconciled flagged false until exact numbers are documented publicly.
sources:
- https://developers.tally.so/api-reference/introduction
- https://tally.so/help/api
responseCodes:
  throttled: 429
limits:
- name: REST API per token
  scope: api_token
  metric: requests
  limit: see Tally API reference
  notes: Per-token throttle; 429 + Retry-After.
- name: Submissions per plan (fair use)
  scope: account
  metric: submissions/month
  limit: -1
  notes: Unlimited under fair-use guidelines.
policies:
- name: Backoff Strategy
  description: Honor Retry-After on 429; use exponential backoff with jitter.
- name: Webhook over polling
  description: Use webhooks for new-submission delivery rather than polling /forms/{id}/submissions.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
