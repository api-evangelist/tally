description: >-
  FOCUS-aligned FinOps profile for Tally. Billing is exclusively a flat
  monthly subscription on Pro ($24) or Business ($74); the Free plan is
  perpetual. Submissions are unlimited under fair use, so cost is independent
  of submission volume. EU-based, GDPR-compliant.
notes: >-
  Only optimisation lever is right-sizing Free vs Pro vs Business based on
  required features (custom branding, custom domain, version retention).
