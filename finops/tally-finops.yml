- name: submissions
  description: Submissions count (informational; not billed).
  unit: submission
  aggregation: sum
  dimensions:
  - workspace
  - form
principles:
- name: Visibility
  description: Track plan tier per workspace; submissions are not billed but worth monitoring for capacity.
- name: Allocation
  description: One workspace per team / cost centre.
- name: Optimization
  description: Right-size to Free vs Pro vs Business based on actual feature need; consolidate workspaces where possible.
- name: Accountability
  description: Assign workspace owner; monitor renewal cadence.
